<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>test</title>
</head>
<body>

<input id="zipInput">
<button id="callapi">実行</button>
<pre id="output"></pre>

<script type="module">
import { GeoApi } from "../api/modules/getzipmain.js";

document.getElementById("callapi").addEventListener("click", async () => {
    const input = document.getElementById("zipInput").value;

    const result = await GeoApi.execute(input);
    document.getElementById("output").textContent =
        JSON.stringify(result, null, 2);
});
</script>

</body>
</html>
</html>
